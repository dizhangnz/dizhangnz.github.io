<div id="search-wrapper" class="search-wrapper" data-url="{{ "" | relLangURL }}">
  <div id="search-modal" class="search-modal">
    <header class="search-header">
      <form class="search-form">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input
          type="search"
          id="search-query"
          class="search-input"
          placeholder="{{ i18n "search.input_placeholder" }}"
          tabindex="0">
      </form>
      <button
        id="close-search-button"
        class="search-close-btn"
        title="{{ i18n "search.close_button_title" }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
    </header>
    <section class="search-results-container">
      <ul id="search-results" data-no-results="{{ i18n "search.no_results" | default "No results found" }}"></ul>
    </section>
  </div>
</div>
